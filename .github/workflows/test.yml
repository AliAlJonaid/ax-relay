name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  portable-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Verify public-safe repository contents
        run: bash scripts/check-public-safety.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install portable dependencies (no PyObjC on Linux)
        run: |
          python -m pip install --upgrade pip
          grep -v '^pyobjc' requirements.txt | pip install -r /dev/stdin

      - name: Provide a headless display for PyAutoGUI imports
        run: |
          command -v xvfb-run >/dev/null || {
            sudo apt-get update
            sudo apt-get install --no-install-recommends -y xvfb
          }

      - name: Run portable unit tests
        working-directory: agents
        run: |
          set -e
          # Core logic — agent_core tail section skips on non-macOS (PyObjC import chain).
          python test_rate_limit_verifier.py
          python test_lessons.py
          xvfb-run -a python test_appname_verify.py
          xvfb-run -a python test_executor_gate.py

      - name: Note skipped macOS-only tests
        run: |
          echo "Skipped on Linux CI (require PyObjC / live AX tree):"
          echo "  test_ax.py test_perception.py test_reflexion.py"
          echo "  test_interrupt_stuck.py test_telegram_auth_interrupt.py"
